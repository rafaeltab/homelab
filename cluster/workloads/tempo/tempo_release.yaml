apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tempo
  namespace: observability
spec:
  interval: 5m
  chart:
    spec:
      chart: tempo-distributed
      version: "1.48.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    global:
      extraEnvFrom:
        - secretRef:
            name: tempo-minio-user

    config: |
      server:
        http_listen_port: 3200
        grpc_listen_port: 9095

      distributor:
        receivers:
          otlp:
            protocols:
              http: {}
              grpc: {}

      ingester:
        max_block_bytes: 104857600
        max_block_duration: 5m

      compactor:
        compaction:
          block_retention: 0s
          compacted_block_retention: 1h
          compaction_window: 1h

      storage:
        trace:
          backend: s3
          s3:
            endpoint: minio.minio.svc.cluster.local:80
            bucket: tempo-blocks
            insecure: true
            access_key: ${AWS_ACCESS_KEY_ID:-${access_key:-}}
            secret_key: ${AWS_SECRET_ACCESS_KEY:-${secret_key:-}}

      memberlist:
        join_members:
          - tempo-gossip-ring

      usage_report:
        reporting_enabled: false

    memcached:
      enabled: false

    serviceAccount:
      create: true

    distributor:
      replicas: 1
      extraArgs:
        - "-config.expand-env=true"

    ingester:
      replicas: 1
      extraArgs:
        - "-config.expand-env=true"

    compactor:
      replicas: 1
      extraArgs:
        - "-config.expand-env=true"

    querier:
      replicas: 1
      extraArgs:
        - "-config.expand-env=true"

    queryFrontend:
      replicas: 1
      extraArgs:
        - "-config.expand-env=true"

    queryScheduler:
      enabled: true
      replicas: 1
      extraArgs:
        - "-config.expand-env=true"

    gateway:
      enabled: true
      replicas: 1
      service:
        type: ClusterIP
      extraArgs:
        - "-config.expand-env=true"

    metricsGenerator:
      enabled: false

    metaMonitoring:
      serviceMonitor:
        enabled: false
