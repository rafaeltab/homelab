apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tempo
  namespace: observability
spec:
  interval: 5m
  chart:
    spec:
      chart: tempo-distributed
      version: "1.48.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    global:
      extraEnvFrom:
        - secretRef:
            name: tempo-minio-user
      extraArgs:
        - "-config.expand-env=true"

    tempo:
      structuredConfig:
        storage:
          trace:
            backend: s3
            s3:
              endpoint: minio.minio.svc.cluster.local:80
              bucket: tempo-blocks
              insecure: true
              access_key: ${access_key}
              secret_key: ${secret_key}
        distributor:
          receivers:
            otlp:
              protocols:
                http: {}
                grpc: {}
        ingester:
          max_block_bytes: 104857600
          max_block_duration: 5m
        compactor:
          compaction:
            block_retention: 0s
        usage_report:
          reporting_enabled: false

    memcached:
      enabled: false

    serviceAccount:
      create: true

    distributor:
      replicas: 1

    ingester:
      replicas: 1

    compactor:
      replicas: 1

    querier:
      replicas: 1

    queryFrontend:
      replicas: 1

    queryScheduler:
      enabled: true
      replicas: 1

    gateway:
      enabled: true
      replicas: 1
      service:
        type: ClusterIP

    metricsGenerator:
      enabled: false

    metaMonitoring:
      serviceMonitor:
        enabled: false
