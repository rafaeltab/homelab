apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-homelab1-local-rafaeltab-com
  namespace: observability
spec:
  secretName: grafana-homelab1-local-rafaeltab-com-tls
  renewBefore: 240h
  dnsNames:
    - "grafana.homelab1.local.rafaeltab.com"
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
